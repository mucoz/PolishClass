<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PolishClass — Learn Polish</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-full bg-gradient-to-br from-slate-50 via-white to-indigo-50 font-[system-ui,-apple-system,sans-serif] antialiased">
  <div id="app" class="h-full flex flex-col max-w-2xl mx-auto px-3 sm:px-4 relative">

    <header class="sticky top-0 z-40 pt-3 pb-2 bg-gradient-to-br from-slate-50 via-white to-indigo-50">
      <div class="flex items-center gap-2 mb-3">
        <h1 class="text-lg font-bold text-slate-800 tracking-tight">
          <span class="text-indigo-600">Polish</span>Class
        </h1>
        <span class="text-[10px] font-semibold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-full border border-indigo-200">A1</span>
      </div>

      <div class="flex gap-1 p-0.5 bg-white/90 backdrop-blur rounded-2xl shadow-sm border border-slate-200" id="tabBar">
        <button data-tab="examples" class="tab-btn flex-1 py-2.5 px-4 rounded-xl font-medium text-sm transition-all">Examples</button>
        <button data-tab="exercises" class="tab-btn flex-1 py-2.5 px-4 rounded-xl font-medium text-sm transition-all">Exercises</button>
        <button data-tab="czytanki" class="tab-btn flex-1 py-2.5 px-4 rounded-xl font-medium text-sm transition-all hidden">Czytanki</button>
      </div>

      <div class="mt-2 flex flex-wrap gap-1.5" id="topicBar"></div>

      <div class="mt-2 flex items-center justify-between">
        <div class="flex gap-1.5" id="levelBar"></div>
        <button id="headerShuffleBtn" class="text-xs text-indigo-500 hover:text-indigo-700 font-medium px-2 py-1 rounded-lg hover:bg-indigo-50 transition-all">Shuffle</button>
      </div>

      <div class="mt-2 flex items-center gap-1.5" id="countBar">
        <span class="text-xs text-slate-400 font-medium">Count:</span>
      </div>

      <div class="mt-1 text-[10px] text-slate-400 font-medium">
        <span id="wordCount">0</span> nouns &middot; <span id="adjCount">0</span> adjectives loaded
      </div>
    </header>

    <div id="polishKeyboard" class="hidden"></div>

    <main class="flex-1 overflow-y-auto scroll-smooth" id="contentArea">
      <div id="exampleContent" class="py-2"></div>
      <div id="exerciseContent" class="py-2 hidden"></div>
      <div id="czytankiContent" class="py-2 hidden"></div>
    </main>
  </div>

  <script src="js/lib/gsap.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/data/a1/nouns.js"></script>
  <script src="js/data/a1/adjectives.js"></script>
  <script src="js/data/a1/caseInfo.js"></script>
  <script src="js/data/a1/nominative.js"></script>
  <script src="js/data/a1/accusative.js"></script>
  <script src="js/data/a1/instrumental.js"></script>
  <script src="js/data/a1/mixed.js"></script>
  <script src="js/data/a1/stories.js"></script>
  <script src="js/data/a1/curatedExercises.js"></script>
  <script src="js/modules/caseInfoModal.js"></script>
  <script src="js/modules/tabManager.js"></script>
  <script src="js/modules/topicManager.js"></script>
  <script src="js/modules/levelManager.js"></script>
  <script src="js/modules/exampleEngine.js"></script>
  <script src="js/modules/exerciseEngine.js"></script>
  <script src="js/modules/storyEngine.js"></script>
  <script src="js/modules/polishKeyboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
